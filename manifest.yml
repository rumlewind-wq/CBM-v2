manifest:
  description: "Inventarliste over rapportens struktur (overskrifter, underoverskrifter og rækker) baseret på den givne CSV-tekst. Rækkefølgen er som i filen."
  q_header: ["Q0", "Q1"]

  metadata:
    order:
      - "Game"
      - "Game mode"
      - "Last quarter simulated"
      - "Market"
      - "Total number of markets"
      - "Total banks in market"
      - "Total number of banks"
      - "Bank"

  sections:

    - section: "ECONOMIC ENVIRONMENT REPORT"
      subsections:

        - subsection: "CAPITAL REQUIREMENTS"
          rows:
            - "Minimum Tier I Capital to Risk Assets"
            - "Minimum Tier I + Tier II Capital to Risk Assets"
            - "Minimum Tier I Capital to Total Assets"

        - subsection: "DEPOSIT RESTRICTIONS"
          subsubsections:
            - title: "Retail Demand Deposits"
              rows:
                - "Reserve Requirement"
                - "Interest Rate Ceiling"
            - title: "Corporate Demand Deposits"
              rows:
                - "Reserve Requirement"
                - "Interest Rate Ceiling"
            - title: "Savings Deposits"
              rows:
                - "Reserve Requirement"
                - "Interest Rate Ceiling"
            - title: "Savings Certificates (CDs)"
              rows:
                - "Reserve Requirement"
                - "Interest Rate Ceiling"
            - title: "Long-term Time Deposits"
              rows:
                - "Reserve Requirement"
                - "Interest Rate Ceiling"
            - title: "Wholesale Deposits"
              rows:
                - "Reserve Requirement"

        - subsection: "ASSET RISK WEIGHTS"
          rows:
            - "Required Reserves"
            - "Excess Reserves"
            - "Interbank Lending (CIBOR)"
            - "Business Loans - Fixed-Rate"
            - "Business Loans - Floating-Rate"
            - "Consumer Loans"
            - "Mortgages"
            - "Government Bonds"
            - "Fixed Assets"

        - subsection: "OTHER RATES"
          rows:
            - "Annualized DGS Premium (% of insured deposits)"
            - "Annualized Penalty Premium on Discount Window Advances"
            - "Percentage of Nonperforming Loans in Loan Loss Allowance"
            - "Corporate Income Tax Rate"
            - "Long-Term Capital Gains Tax Rate"
            - "Minimum Holding Period for Long-term Capital Gains"

        - subsection: "SIMULATION"
          rows:
            - "Simulator Version"

    - section: "BOND MARKET REPORT"
      rows:
        - "Gross Domestic Product (DKK billions)"
        - "Floating-rate Loan Base"
        - "Market Price (T)"
        - "Coupon Amount (T+1)"
        - "Market Price (T+1)"
        - "Market Yield (T+1)"
        - "Coupon Amount (T+2)"
        - "Market Price (T+2)"
        - "Market Yield (T+2)"
        - "Coupon Amount (T+3)"
        - "Market Price (T+3)"
        - "Market Yield (T+3)"
        - "Coupon Amount (T+4)"
        - "Market Price (T+4)"
        - "Market Yield (T+4)"
        - "Coupon Amount (T+5)"
        - "Market Price (T+5)"
        - "Market Yield (T+5)"
        - "Coupon Amount (T+6)"
        - "Market Price (T+6)"
        - "Market Yield (T+6)"
        - "Coupon Amount (T+7)"
        - "Market Price (T+7)"
        - "Market Yield (T+7)"
        - "Coupon Amount (T+8)"
        - "Market Price (T+8)"
        - "Market Yield (T+8)"

    - section: "PERFORMANCE REPORT"
      entities:
        - name: "Bank 1"
          rows:
            - "Bank name"
            - "Number"
            - "Market"
            - "Market Value"
            - "Recapitalizations: Full / Partial"
            - "Cumulative Dividends"
            - "Price per Share"
            - "Current Net Income"


    - section: "REGIONAL INTEREST RATE REPORT"
      entities:
        - name: "Bank 1"
          rows:
            - "Bank name"
            - "Business Loans - Fixed-Rate"
            - "Business Loans - Floating-Rate"
            - "Consumer Loans"
            - "Mortgage Loans"
            - "Retail Demand Deposits"
            - "Corporate Demand Deposits"
            - "Savings Deposits"
            - "Savings Certificates (CDs)"
            - "Long-term Time Deposits"

    - section: "MARKET AVERAGE BALANCE SHEET"
      subsections:

        - subsection: "ASSETS"
          rows:
            - "Required Reserves"
            - "Excess Reserves"
            - "Interbank Lending (at CIBOR)"
            - "Interbank Lending (CIBOR)"
            - "Business Loans - Fixed-Rate"
            - "Business Loans - Fixed-Rate (Rate)"
          groups:
            - title: "Business Loans - Floating-Rate, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
            - title: "Consumer Loans, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
            - title: "Mortgage Loans, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
                - "T+5"
                - "T+5 (rate)"
                - "T+6"
                - "T+6 (rate)"
                - "T+7"
                - "T+7 (rate)"
                - "T+8"
                - "T+8 (rate)"
            - title: "Government Bonds, maturing start of:"
              rows:
                - "T+1"
                - "T+2"
                - "T+3"
                - "T+4"
                - "T+5"
                - "T+6"
                - "T+7"
                - "T+8"
          tail_rows:
            - "Fixed Assets"
            - "Loan Loss Allowance"
            - "TOTAL ASSETS"

        - subsection: "LIABILITIES"
          head_rows:
            - "Interbank Borrowing"
            - "Interbank Borrowing (rate)"
          groups:
            - title: "Demand Deposits"
              rows:
                - "Retail"
                - "Retail (rate)"
                - "Corporate"
                - "Corporate (rate)"
            - title: "Wholesale Deposits, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
            - title: "Savings Deposits"
              rows:
                - "Savings Deposits"
                - "Savings Deposits (rate)"
            - title: "Savings Certificates (CDs), maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
            - title: "Long-term Time Deposits, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
                - "T+5"
                - "T+5 (rate)"
                - "T+6"
                - "T+6 (rate)"
                - "T+7"
                - "T+7 (rate)"
                - "T+8"
                - "T+8 (rate)"
          tail_rows:
            - "Discount Window Advances"
            - "Discount Window Advances (rate)"
            - "EQUITY CAPITAL"
            - "Net Worth and Retained Earnings"
            - "TOTAL LIABILITIES AND NET WORTH"

    - section: "BANK BALANCE SHEET"
      subsections:

        - subsection: "ASSETS"
          rows:
            - "Required Reserves"
            - "Excess Reserves"
            - "Interbank Lending (at CIBOR)"
            - "Interbank Lending (CIBOR)"
            - "Business Loans - Fixed-Rate"
            - "Business Loans - Fixed-Rate (Rate)"
          groups:
            - title: "Business Loans - Floating-Rate, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
            - title: "Consumer Loans, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
            - title: "Mortgage Loans, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
                - "T+5"
                - "T+5 (rate)"
                - "T+6"
                - "T+6 (rate)"
                - "T+7"
                - "T+7 (rate)"
                - "T+8"
                - "T+8 (rate)"
            - title: "Government Bonds, maturing start of:"
              rows:
                - "T+1"
                - "T+2"
                - "T+3"
                - "T+4"
                - "T+5"
                - "T+6"
                - "T+7"
                - "T+8"
          tail_rows:
            - "Fixed Assets"
            - "Loan Loss Allowance"
            - "TOTAL ASSETS"

        - subsection: "LIABILITIES"
          head_rows:
            - "Interbank Borrowing"
            - "Interbank Borrowing (rate)"
          groups:
            - title: "Demand Deposits"
              rows:
                - "Retail"
                - "Retail (rate)"
                - "Corporate"
                - "Corporate (rate)"
            - title: "Wholesale Deposits, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
            - title: "Savings Deposits"
              rows:
                - "Savings Deposits"
                - "Savings Deposits (rate)"
            - title: "Savings Certificates (CDs), maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
            - title: "Long-term Time Deposits, maturing start of:"
              rows:
                - "T+1"
                - "T+1 (rate)"
                - "T+2"
                - "T+2 (rate)"
                - "T+3"
                - "T+3 (rate)"
                - "T+4"
                - "T+4 (rate)"
                - "T+5"
                - "T+5 (rate)"
                - "T+6"
                - "T+6 (rate)"
                - "T+7"
                - "T+7 (rate)"
                - "T+8"
                - "T+8 (rate)"
          tail_rows:
            - "Discount Window Advances"
            - "Discount Window Advances (rate)"
            - "EQUITY CAPITAL"
            - "Net Worth and Retained Earnings"
            - "TOTAL LIABILITIES AND NET WORTH"

    - section: "SUMMARY BALANCE SHEET"
      subsections:
        - subsection: "ASSETS"
          rows:
            - "Required Reserves (at the Danmarks Nationalbank)"
            - "Excess Reserve Balances"
            - "Interbank Lending (at CIBOR)"
            - "Business Loans - Fixed-Rate"
            - "Business Loans - Floating-Rate"
            - "Consumer Loans"
            - "Mortgages"
            - "Government Bonds"
            - "Fixed Assets"
            - "Loan Loss Allowance"
            - "TOTAL ASSETS"
        - subsection: "LIABILITIES"
          rows:
            - "Interbank Borrowing"
            - "Retail Demand Deposits"
            - "Corporate Demand Deposits"
            - "Wholesale Deposits"
            - "Savings Deposits"
            - "Savings Certificates (CDs)"
            - "Long-term Time Deposits"
            - "Discount Window Advances"
            - "Net Worth and Retained Earnings"
            - "TOTAL LIABILITIES AND NET WORTH"

    - section: "INCOME AND EXPENSE REPORT"
      subsections:
        - subsection: "CURRENT REVENUE"
          groups:
            - title: "Fee Income"
              rows:
                - "Retail Demand Deposits"
                - "Corporate Demand Deposits"
            - title: "Interest Income"
              rows:
                - "Business Loans - Fixed-Rate"
                - "Business Loans - Floating-Rate"
                - "Consumer Loans"
                - "Mortgages"
                - "Government Bonds"
                - "Interbank Lending (at CIBOR)"
                - "Realized (Short-term) Gain/Loss on Bonds"
          tail_rows:
            - "TOTAL REVENUE"
        - subsection: "CURRENT EXPENSES"
          head_rows:
            - "Interbank Borrowing"
            - "Corporate Demand Deposits"
            - "Retail Demand Deposits"
            - "Wholesale Deposits"
            - "Savings Deposits"
            - "Savings Certificates (CDs)"
            - "Long-term Time Deposits"
            - "Discount Window Advances"
            - "Provision for Loan Losses"
          groups:
            - title: "Advertising"
              rows:
                - "Consumer Loans"
                - "Mortgages"
                - "Retail Demand Deposits"
                - "Corporate Demand Deposits"
                - "Savings Certificates (CDs)"
                - "Savings Deposits"
                - "Long-term Time Deposits"
            - title: "Other Non-interest Operating Costs"
              rows:
                - "DGS Deposit Insurance Premium"
                - "Interbank Borrowing and Lending"
                - "Business Loans - Fixed-Rate"
                - "Business Loans - Floating-Rate"
                - "Consumer Loans"
                - "Mortgages"
                - "Government Bonds"
                - "Retail Demand Deposits"
                - "Corporate Demand Deposits"
                - "DD Costs Offset by Excess Reserves"
                - "Wholesale Deposits"
                - "Savings Deposits"
                - "Savings Certificates (CDs)"
                - "Long-term Time Deposits"
                - "Premises and Fixed Assets"
                - "Other Transaction Costs"
                - "Restructuring Charges"
          tail_rows:
            - "TOTAL EXPENSES"
            - "NET CURRENT OPERATING EARNINGS"
            - "Taxes on Current Earnings"
            - "Realized (Long-term) Capital Gains"
            - "Taxes Applicable to Capital Gains"
            - "Total Taxes"
            - "TOTAL NET INCOME"

    - section: "CAPITALIZATION REPORT"
      rows:
        - "Price Per Share: Current quarter"
        - "Price Per Share: Prior quarter"
        - "Market Value of Equity: Current quarter"
        - "Prior quarter"
        - "Book Value of Equity: Current quarter"
        - "Prior quarter"
        - "Number of Shares Outstanding: Current quarter"
        - "Prior quarter"
        - "Number of Shares Sold by Management: Current quarter"
        - "Prior quarter"
        - "Price of Shares Sold by Management: Current quarter"
        - "Prior quarter"
        - "Number of Shares Sold by Regulators: Current quarter"
        - "Prior quarter"
        - "Price of Shares Sold by Regulators: Current quarter"
        - "Prior quarter"
        - "Dividends Paid: Current quarter"
        - "Prior quarter"
        - "Net Total Assets: Current quarter"
        - "Prior quarter"
        - "Risk-weighted Assets: Current quarter"
        - "Prior quarter"
        - "Basel Tier I Ratio: Current quarter"
        - "Prior quarter"
        - "Basel Tier I+II Ratio: Current quarter"
        - "Prior quarter"
        - "Capital/Asset Ratio: Current quarter"
        - "Prior quarter"

    - section: "LOAN PERFORMANCE REPORT"
      groups:
        - title: "Business Loans - Fixed-Rate"
          rows:
            - "Matured Last Quarter (DKK 1,000s)"
            - "Defaulted (DKK 1,000s)"
            - "Percent Defaulted"
            - "Percent Nonperforming"
            - "Nonperforming (DKK 1,000s)"
        - title: "Business Loans - Floating-Rate"
          rows:
            - "Matured Last Quarter (DKK 1,000s)"
            - "Defaulted (DKK 1,000s)"
            - "Percent Defaulted"
            - "Percent Nonperforming"
            - "Nonperforming (DKK 1,000s)"
        - title: "Consumer Loans"
          rows:
            - "Matured Last Quarter (DKK 1,000s)"
            - "Defaulted (DKK 1,000s)"
            - "Percent Defaulted"
            - "Percent Nonperforming"
            - "Nonperforming (DKK 1,000s)"
        - title: "Mortgage Loans"
          rows:
            - "Matured Last Quarter (DKK 1,000s)"
            - "Defaulted (DKK 1,000s)"
            - "Percent Defaulted"
            - "Percent Nonperforming"
            - "Nonperforming (DKK 1,000s)"
        - title: "TOTAL"
          rows:
            - "TOTAL Matured Last Quarter (DKK 1,000s)"
            - "TOTAL Defaulted (DKK 1,000s)"
            - "TOTAL Nonperforming (DKK 1,000s)"

    - section: "BOND PORTFOLIO REPORT"
      head_rows:
        - "Book Value of Portfolio"
        - "Market Value of Portfolio"
        - "Maturity (start of):"
      quarters:
        - quarter: "Quarter T+1"
          rows:
            - "Market Price (T)"
            - "Bank Holdings"
        - quarter: "Quarter T+2"
          rows:
            - "Coupon Amount (T+1)"
            - "Market Price (T+1)"
            - "Market Yield (T+1)"
            - "Bank Holdings"
        - quarter: "Quarter T+3"
          rows:
            - "Coupon Amount (T+2)"
            - "Market Price (T+2)"
            - "Market Yield (T+2)"
            - "Bank Holdings"
        - quarter: "Quarter T+4"
          rows:
            - "Coupon Amount (T+3)"
            - "Market Price (T+3)"
            - "Market Yield (T+3)"
            - "Bank Holdings"
        - quarter: "Quarter T+5"
          rows:
            - "Coupon Amount (T+4)"
            - "Market Price (T+4)"
            - "Market Yield (T+4)"
            - "Bank Holdings"
        - quarter: "Quarter T+6"
          rows:
            - "Coupon Amount (T+5)"
            - "Market Price (T+5)"
            - "Market Yield (T+5)"
            - "Bank Holdings"
        - quarter: "Quarter T+7"
          rows:
            - "Coupon Amount (T+6)"
            - "Market Price (T+6)"
            - "Market Yield (T+6)"
            - "Bank Holdings"
        - quarter: "Quarter T+8"
          rows:
            - "Coupon Amount (T+7)"
            - "Market Price (T+7)"
            - "Market Yield (T+7)"
            - "Bank Holdings"
        - quarter: "Quarter T+9"
          rows:
            - "Coupon Amount (T+8)"
            - "Market Price (T+8)"
            - "Market Yield (T+8)"

    - section: "DECISIONS"
      subsections:
        - subsection: "Quantities"
          rows:
            - "Initial Reserve Allocation"
            - "Interbank Lending (at CIBOR)"
            - "Interbank Borrowing"
            - "90-day Wholesale Deposits to Issue"
            - "180-day Wholesale Deposits to Issue"
            - "360-day Wholesale Deposits to Issue"
            - "New 8-quarter Government Bonds to Purchase"
            - "Government Bonds to Sell, due start of T+2"
            - "Government Bonds to Sell, due start of T+3"
            - "Government Bonds to Sell, due start of T+4"
            - "Government Bonds to Sell, due start of T+5"
            - "Government Bonds to Sell, due start of T+6"
            - "Government Bonds to Sell, due start of T+7"
            - "Government Bonds to Sell, due start of T+8"
        - subsection: "Rates"
          rows:
            - "Business Loans - Fixed-Rate"
            - "Business Loans - Floating-Rate Spread"
            - "Consumer"
            - "Mortgage Loans"
            - "Savings Certificates (CDs)"
            - "Savings Deposits"
            - "Long-term Time Deposits"
            - "Retail Demand Deposits"
            - "Corporate Demand Deposits"
        - subsection: "Advertising"
          rows:
            - "Consumer Loans"
            - "Mortgage Loans"
            - "Retail Demand Deposits"
            - "Corporate Demand Deposits"
            - "Savings Certificates (CDs)"
            - "Savings Deposits"
            - "Long-term Time Deposits"
        - subsection: "Other Miscellaneous Decisions"
          rows:
            - "Number of Shares to Sell"
            - "Provision for Loan Losses"
            - "Corporate Loan Standard, Fixed Rate"
            - "Corporate Loan Standard, Floating-rate"
            - "Total Dividends"
            - "Percent of Cost Charged to Retail DD"
            - "Percent of Cost Charged to Corporate DD"
